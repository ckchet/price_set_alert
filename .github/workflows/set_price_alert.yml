name: SET Price Alert

on:
  # ไม่ใช้ schedule ของ GitHub แล้ว เพราะให้ cron-job.org เป็นตัวสั่งรันแทน
  # (แม่นยำกว่า ไม่ต้องเข้าคิว scheduled queue ของ GitHub ที่เคยดีเลย์/ข้ามรอบ)
  # เหลือแค่ workflow_dispatch ไว้ให้ cron-job.org เรียกผ่าน API
  # และไว้กดรันเองด้วยมือเพื่อทดสอบได้จากแท็บ Actions
  workflow_dispatch:
    inputs:
      force_run:
        description: "ข้ามการเช็คเวลาตลาด แล้วเช็คราคา+ส่งแจ้งเตือนทันที (ใช้ตอนกดรันเองเพื่อทดสอบ)"
        type: boolean
        default: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RUN: ${{ inputs.force_run }}
        run: python set_price_alert.py